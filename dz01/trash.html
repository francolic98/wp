<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>dz01</title>
    <link rel="stylesheet" href="./css/reset.css">
    <link rel="stylesheet" href="./css/trash.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <nav>
            <div>
                <h1>mydrive</h1>
                <span>💾</span>
            </div>
            <ul>
                <li><i class="fa-solid fa-user"></i></li>
                <li><i class="fa-solid fa-bars"></i></li>
            </ul>
        </nav>
    </header>

    <main>
        <div>
            <ul class="ul">
                <li><a href="/">Files 📁</a></li>
                <li><a href="./shared.html">Shared 🔗</a></li>
                <li><a href="./pinned.html">Pinned 📌</a></li>
                <li><a class="active" href="./trash.html">Trash 🗑</a></li>
            </ul>
            <div>
                <div class="progressbar">
                    <div class="progressbar-filled"></div>
                    <div class="progressbar-empty"></div>
                </div>
                <span>64% storage left</span>
            </div>
        </div>
        <section>
            <div class="section-desc">
                <p class="section-p">Items in <span class="section-span">trash</span> will be removed after 15 days</p>
            </div>
            <div class="row">
                <div class="card">
                    <div class="card-img">
                        📷
                    </div>
                    <div class="card-info">
                        <span>photo2.png</span>
                        <ul>
                            <li><i class="fa-solid fa-download"></i></li>
                            <li><i class="fa-solid fa-share"></i></li>
                            <li><i class="fa-solid fa-trash"></i></li>
                        </ul>
                    </div>
                </div>
                <div class="card">
                    <div class="card-img">
                        🎥
                    </div>
                    <div class="card-info">
                        <span>norway.mp4</span>
                        <ul>
                            <li><i class="fa-solid fa-download"></i></li>
                            <li><i class="fa-solid fa-share"></i></li>
                            <li><i class="fa-solid fa-trash"></i></li>
                        </ul>
                    </div>
                </div>
                <div class="card">
                    <div class="card-img">
                        📷
                    </div>
                    <div class="card-info">
                        <span>yet_another.jpg</span>
                        <ul>
                            <li><i class="fa-solid fa-download"></i></li>
                            <li><i class="fa-solid fa-share"></i></li>
                            <li><i class="fa-solid fa-trash"></i></li>
                        </ul>
                    </div>
                </div>
            </div>
            <div class="row">
                <div class="card">
                    <div class="card-img">
                        🎵
                    </div>
                    <div class="card-info">
                        <span>speech.wav</span>
                        <ul>
                            <li><i class="fa-solid fa-download"></i></li>
                            <li><i class="fa-solid fa-share"></i></li>
                            <li><i class="fa-solid fa-trash"></i></li>
                        </ul>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script src="https://kit.fontawesome.com/e291a15b8a.js" crossorigin="anonymous"></script>
</body>
</html>
